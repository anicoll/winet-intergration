version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/pkg/database/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/pkg/database/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "pg_catalog.int4"
            go_type: "int"
          - db_type: "serial"
            go_type: "int"
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
          - db_type: "pg_catalog.timestamptz"
            nullable: false
            go_type:
              import: "time"
              type: "Time"

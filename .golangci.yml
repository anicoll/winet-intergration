version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - noctx
    - bodyclose

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/anicoll/winet-integration

issues:
  max-same-issues: 0

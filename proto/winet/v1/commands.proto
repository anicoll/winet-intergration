// commands.proto defines the CommandService used by the local winet-integration
// service to poll for pending inverter commands queued by the cloud API.
//
// Flow:
//   1. A user (or automation) posts a command via the cloud REST API.
//   2. The cloud backend writes the command to the pending_commands table.
//   3. On each poll cycle the local service calls GetPendingCommands.
//   4. The local service executes each command against the WiNet inverter.
//   5. The local service calls AckCommand to record the outcome.
//
// This decouples the frontend from the local service — no inbound connections
// into the home network are required.

syntax = "proto3";

package winet.v1;

option go_package = "github.com/anicoll/winet-integration/gen/winet/v1;winetv1";

import "google/protobuf/timestamp.proto";

// CommandService lets the local service fetch and acknowledge inverter commands
// that were queued by the cloud API.
service CommandService {
  // GetPendingCommands returns all unacknowledged commands for the given device.
  // The local service calls this on every poll cycle.
  rpc GetPendingCommands(GetPendingCommandsRequest) returns (GetPendingCommandsResponse);

  // AckCommand marks a command as handled. The local service calls this after
  // attempting execution, regardless of whether the inverter accepted it.
  rpc AckCommand(AckCommandRequest) returns (AckCommandResponse);
}

message GetPendingCommandsRequest {
  // device_id is the WiNet device serial number used to scope the query.
  string device_id = 1;
}

message GetPendingCommandsResponse {
  repeated InverterCommand commands = 1;
}

message AckCommandRequest {
  // command_id matches InverterCommand.id from the corresponding GetPendingCommands response.
  string command_id = 1;
  // success indicates whether the inverter accepted and applied the command.
  bool success = 2;
}

message AckCommandResponse {}

// InverterCommand represents a single pending command queued by the cloud API.
// The oneof covers every command implemented in internal/pkg/winet/inverter_commands.go.
// Adding a new inverter command requires a new message variant here and a corresponding
// handler in the local service.
message InverterCommand {
  // id is the stable primary key from the pending_commands table.
  string id = 1;
  // created_at is when the command was queued, useful for ordering and staleness checks.
  google.protobuf.Timestamp created_at = 2;
  oneof command {
    SelfConsumptionCommand self_consumption = 3;
    DischargeCommand discharge = 4;
    ChargeCommand charge = 5;
    BatteryStopCommand battery_stop = 6;
    InverterStateChangeCommand inverter_state_change = 7;
    SetFeedInLimitationCommand set_feed_in_limitation = 8;
  }
}

// SelfConsumptionCommand sets the energy management mode to self-consumption (param 33146 = 0).
// The inverter will prioritise using solar to cover load before charging the battery.
message SelfConsumptionCommand {}

// DischargeCommand forces the battery to discharge at a specific power level.
// Maps to energy management mode 2 with charging/discharging command 187 (param 33147).
message DischargeCommand {
  // discharge_power is the target discharge rate as a decimal string (kW, e.g. "3.6").
  string discharge_power = 1;
}

// ChargeCommand forces the battery to charge at a specific power level.
// Maps to energy management mode 2 with charging/discharging command 170 (param 33147).
message ChargeCommand {
  // charge_power is the target charge rate as a decimal string (kW, e.g. "6.6").
  string charge_power = 1;
}

// BatteryStopCommand halts all active charging and discharging.
// Maps to energy management mode 2 with charging/discharging command 204 (param 33147).
message BatteryStopCommand {}

// InverterStateChangeCommand enables or disables the inverter power output.
message InverterStateChangeCommand {
  // disable=true turns the inverter off; disable=false turns it back on.
  bool disable = 1;
}

// SetFeedInLimitationCommand enables or disables the feed-in limitation setting.
// When limited=true, export to the grid is capped at 0 kW (param 31221 = 170, 31222 = 0.00).
// When limited=false, the cap is removed (param 31221 = 85).
message SetFeedInLimitationCommand {
  bool limited = 1;
}
